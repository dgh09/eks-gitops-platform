---
# ingress-nginx — the cluster's front door.
#
# Two values files, layered: the portable one, then the per-cluster overlay.
# Moving this to EKS is a one-line change here (values-kind -> values-eks);
# the chart version and the common values stay put. See ADR-004.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.15.1
      helm:
        releaseName: ingress-nginx
        # Order matters: later files win on conflicting keys.
        valueFiles:
          - $values/platform/ingress-nginx/values.yaml
          - $values/platform/ingress-nginx/values-kind.yaml
    - repoURL: https://github.com/dgh09/eks-gitops-platform.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
