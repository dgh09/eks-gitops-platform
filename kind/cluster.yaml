kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gitops-platform

networking:
  # Use the standard cluster CIDRs so manifests are portable to EKS.
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Publishes ingress-nginx on the host so http://localhost works.
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
